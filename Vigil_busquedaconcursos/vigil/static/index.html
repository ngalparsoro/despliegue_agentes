<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Concursos Públicos · Mitumi BackStage</title>
  <style>
    :root {
      --bg: #f4f5f7;
      --card: #ffffff;
      --ink: #1a1d24;
      --muted: #6b7280;
      --line: #e6e8ec;
      --primary: #4f46e5;
      --primary-dark: #4338ca;
      --alta: #dc2626;
      --media: #d97706;
      --baja: #16a34a;
      --cerrado: #6b7280;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }
    /* ---- Cabecera ---- */
    header {
      position: sticky; top: 0; z-index: 20;
      background: #fff;
      border-bottom: 1px solid var(--line);
      padding: 16px 24px;
      display: flex; align-items: center; gap: 16px;
      flex-wrap: wrap;
    }
    .brand { display: flex; flex-direction: column; gap: 2px; margin-right: auto; }
    .brand .kicker {
      font-size: 12px; font-weight: 600; letter-spacing: .08em;
      text-transform: uppercase; color: var(--primary);
    }
    .brand h1 { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: -.01em; }
    .status { font-size: 13px; color: var(--muted); min-height: 18px; text-align: right; }
    button.primary {
      appearance: none; border: 0; cursor: pointer;
      background: var(--primary); color: #fff;
      font-size: 14px; font-weight: 600;
      padding: 11px 18px; border-radius: 10px;
      display: inline-flex; align-items: center; gap: 9px;
      transition: background .15s ease, transform .05s ease;
    }
    button.primary:hover { background: var(--primary-dark); }
    button.primary:active { transform: translateY(1px); }
    button.primary:disabled { opacity: .65; cursor: default; }
    .spinner {
      width: 15px; height: 15px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,.5); border-top-color: #fff;
      animation: spin .7s linear infinite; display: none;
    }
    button.primary.loading .spinner { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- Barra de filtros ---- */
    .filters {
      position: sticky; top: 65px; z-index: 15;
      background: var(--bg);
      padding: 16px 24px;
      display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
      border-bottom: 1px solid var(--line);
    }
    .search {
      position: relative; flex: 1 1 260px; min-width: 200px;
    }
    .search svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); }
    .search input {
      width: 100%; padding: 10px 12px 10px 38px;
      border: 1px solid var(--line); border-radius: 10px; background: #fff;
      font-size: 14px; color: var(--ink);
    }
    .search input:focus { outline: 2px solid rgba(79,70,229,.35); border-color: var(--primary); }
    select {
      padding: 10px 12px; border: 1px solid var(--line); border-radius: 10px;
      background: #fff; font-size: 14px; color: var(--ink); cursor: pointer;
    }
    .toggle {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 14px; color: var(--ink); cursor: pointer; user-select: none;
      padding: 9px 12px; border: 1px solid var(--line); border-radius: 10px; background: #fff;
    }
    .toggle input { accent-color: var(--primary); width: 16px; height: 16px; cursor: pointer; }

    /* ---- Rejilla de resultados ---- */
    main { padding: 20px 24px 60px; }
    .count { font-size: 14px; color: var(--muted); margin: 0 2px 16px; }
    .grid {
      display: grid; gap: 16px;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    }
    .card {
      background: var(--card); border: 1px solid var(--line); border-radius: 14px;
      padding: 18px; display: flex; flex-direction: column; gap: 12px;
      box-shadow: 0 1px 3px rgba(16,24,40,.06);
      transition: box-shadow .15s ease, transform .15s ease;
    }
    .card:hover { box-shadow: 0 6px 20px rgba(16,24,40,.10); transform: translateY(-2px); }
    .card-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 700; letter-spacing: .02em;
      padding: 5px 10px; border-radius: 999px;
    }
    .badge .dot { width: 7px; height: 7px; border-radius: 50%; }
    .badge.alta { background: rgba(220,38,38,.10); color: var(--alta); }
    .badge.alta .dot { background: var(--alta); }
    .badge.media { background: rgba(217,119,6,.12); color: var(--media); }
    .badge.media .dot { background: var(--media); }
    .badge.baja { background: rgba(22,163,74,.12); color: var(--baja); }
    .badge.baja .dot { background: var(--baja); }
    .badge.cerrado, .badge.desconocida { background: rgba(107,114,128,.12); color: var(--cerrado); }
    .badge.cerrado .dot, .badge.desconocida .dot { background: var(--cerrado); }
    .dip { font-size: 12px; font-weight: 600; color: var(--muted); }
    .title { font-size: 16px; font-weight: 650; line-height: 1.35; margin: 0; }
    .org { font-size: 13px; color: var(--muted); margin: -4px 0 0; }
    .meta { display: flex; flex-wrap: wrap; gap: 14px; font-size: 13px; }
    .meta .k { color: var(--muted); }
    .meta .v { font-weight: 600; }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      font-size: 12px; padding: 4px 9px; border-radius: 999px;
      background: #eef1f6; color: #455065; font-weight: 500;
    }
    .rel {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 600; padding: 3px 9px; border-radius: 999px;
    }
    .rel.si { background: rgba(22,163,74,.12); color: var(--baja); }
    .rel.no { background: rgba(107,114,128,.12); color: var(--cerrado); }
    .motivo { font-size: 13px; color: #4b5563; line-height: 1.45; margin: 0; }
    .card-foot { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; margin-top: 2px; padding-top: 12px; border-top: 1px solid var(--line); }
    .link {
      font-size: 13px; font-weight: 600; color: var(--primary); text-decoration: none;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .link:hover { text-decoration: underline; }
    .empty, .loading-state {
      text-align: center; padding: 70px 20px; color: var(--muted);
    }
    .empty h3 { color: var(--ink); margin: 0 0 6px; }

    /* ---- Aviso emergente ---- */
    .toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 50;
      background: #101828; color: #fff; padding: 13px 18px; border-radius: 12px;
      font-size: 14px; box-shadow: 0 10px 30px rgba(0,0,0,.25);
      opacity: 0; transform: translateY(12px); transition: opacity .25s, transform .25s;
      pointer-events: none; max-width: 320px;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    @media (max-width: 560px) {
      header, .filters, main { padding-left: 16px; padding-right: 16px; }
      .filters { top: 73px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <span class="kicker">Mitumi BackStage</span>
      <h1>Concursos Públicos</h1>
    </div>
    <div class="status" id="status"></div>
    <button class="primary" id="btnBuscar" onclick="buscarAhora()">
      <span class="spinner"></span>
      <span id="btnBuscarText">Actualizar ahora</span>
    </button>
  </header>

  <div class="filters">
    <div class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="7"></circle><path d="m21 21-4.3-4.3"></path>
      </svg>
      <input id="q" type="text" placeholder="Buscar por objeto u organismo…" oninput="debounced()">
    </div>
    <select id="diputacion" onchange="cargar()">
      <option value="">Todas las diputaciones</option>
      <option value="Araba">Araba</option>
      <option value="Gipuzkoa">Gipuzkoa</option>
      <option value="Bizkaia">Bizkaia</option>
    </select>
    <select id="urgencia" onchange="cargar()">
      <option value="">Cualquier urgencia</option>
      <option value="alta">Urgencia alta</option>
      <option value="media">Urgencia media</option>
      <option value="baja">Urgencia baja</option>
      <option value="cerrado">Cerrado</option>
      <option value="desconocida">Sin determinar</option>
    </select>
    <label class="toggle"><input type="checkbox" id="en_plazo" onchange="cargar()"> Solo en plazo</label>
    <label class="toggle"><input type="checkbox" id="relevante" checked onchange="cargar()"> Solo relevantes</label>
  </div>

  <main>
    <p class="count" id="count"></p>
    <div class="grid" id="grid"></div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const $ = (id) => document.getElementById(id);

    // formateo el plazo (ISO -> dd/mm/aaaa) para mostrarlo bonito
    function fmtPlazo(c) {
      if (c.plazo_iso) {
        const d = new Date(c.plazo_iso);
        if (!isNaN(d)) return d.toLocaleDateString("es-ES", { day: "2-digit", month: "2-digit", year: "numeric" });
      }
      return c.plazo_presentacion || "Sin plazo";
    }
    // compongo la etiqueta de urgencia (p. ej. "ALTA · 3 días hábiles")
    function fmtUrgencia(c) {
      const nivel = (c.urgencia_nivel || "desconocida");
      if (nivel === "cerrado") return "CERRADO";
      if (nivel === "desconocida") return "PLAZO SIN DETERMINAR";
      const d = c.urgencia_dias;
      const cola = (d === null || d === undefined) ? "" : ` · ${d} ${d === 1 ? "día hábil" : "días hábiles"}`;
      return nivel.toUpperCase() + cola;
    }
    function escape(s) {
      return (s || "").replace(/[&<>"]/g, (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[m]));
    }

    // dibujo una tarjeta de concurso
    function tarjeta(c) {
      const nivel = c.urgencia_nivel || "desconocida";
      const chips = (c.etiquetas || []).map((e) => `<span class="chip">${escape(e)}</span>`).join("");
      const rel = c.relevante
        ? `<span class="rel si">● Relevante</span>`
        : `<span class="rel no">○ No relevante</span>`;
      const importe = c.importe ? `<span><span class="k">Importe</span> <span class="v">${escape(c.importe)} €</span></span>` : "";
      return `
        <article class="card">
          <div class="card-top">
            <span class="badge ${nivel}"><span class="dot"></span>${fmtUrgencia(c)}</span>
            <span class="dip">${escape(c.diputacion || "")}</span>
          </div>
          <h2 class="title">${escape(c.objeto || "(sin título)")}</h2>
          <p class="org">${escape(c.organo_convocante || "")}</p>
          <div class="meta">
            <span><span class="k">Plazo</span> <span class="v">${fmtPlazo(c)}</span></span>
            ${importe}
          </div>
          ${chips ? `<div class="chips">${chips}</div>` : ""}
          <div>${rel}</div>
          ${c.motivo ? `<p class="motivo">${escape(c.motivo)}</p>` : ""}
          <div class="card-foot">
            <a class="link" href="/concursos/${encodeURIComponent(c.id_expediente)}/pliego.pdf" target="_blank" rel="noopener">
              Ver pliego
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M7 17 17 7M8 7h9v9"></path>
              </svg>
            </a>
            ${c.plazo_iso ? `<a class="link cal" href="/concursos/${encodeURIComponent(c.id_expediente)}/calendario.ics" download>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="4" width="18" height="18" rx="2"></rect><path d="M16 2v4M8 2v4M3 10h18"></path>
              </svg>
              Añadir al calendario
            </a>` : ""}
          </div>
        </article>`;
    }

    // construyo la query con los filtros y pido los concursos a la API
    async function cargar() {
      const p = new URLSearchParams();
      if ($("q").value.trim()) p.set("q", $("q").value.trim());
      if ($("diputacion").value) p.set("diputacion", $("diputacion").value);
      if ($("urgencia").value) p.set("urgencia", $("urgencia").value);
      if ($("en_plazo").checked) p.set("en_plazo", "true");
      if ($("relevante").checked) p.set("relevante", "true");
      p.set("limite", "200");

      $("grid").innerHTML = "";
      $("count").textContent = "Cargando…";
      try {
        const r = await fetch("/concursos?" + p.toString());
        const data = await r.json();
        const lista = data.concursos || [];
        if (lista.length === 0) {
          $("count").textContent = "";
          $("grid").innerHTML = `<div class="empty"><h3>Sin resultados</h3><p>No hay concursos que coincidan con estos filtros.</p></div>`;
          return;
        }
        $("count").textContent = `${lista.length} concurso${lista.length === 1 ? "" : "s"}`;
        $("grid").innerHTML = lista.map(tarjeta).join("");
      } catch (e) {
        $("count").textContent = "";
        $("grid").innerHTML = `<div class="empty"><h3>No se pudo conectar</h3><p>¿Está el servidor en marcha?</p></div>`;
      }
    }

    // retraso la búsqueda mientras se escribe, para no llamar en cada tecla
    let t;
    function debounced() { clearTimeout(t); t = setTimeout(cargar, 300); }

    // muestro un aviso emergente unos segundos
    function toast(msg) {
      const el = $("toast");
      el.textContent = msg;
      el.classList.add("show");
      setTimeout(() => el.classList.remove("show"), 4000);
    }

    // lanzo el agente en vivo y voy consultando su estado hasta que termina
    async function buscarAhora() {
      const btn = $("btnBuscar");
      btn.disabled = true; btn.classList.add("loading");
      $("btnBuscarText").textContent = "Buscando concursos…";
      $("status").textContent = "El agente está consultando las diputaciones…";
      try {
        const r = await fetch("/ejecuciones", { method: "POST" });
        const run = await r.json();
        // consulto el estado cada 800 ms
        while (true) {
          await new Promise((res) => setTimeout(res, 800));
          const s = await (await fetch("/ejecuciones/" + run.id)).json();
          if (s.estado === "terminada") {
            $("status").textContent = "Última búsqueda: completada";
            toast(`Búsqueda completada · ${s.nuevos} concurso${s.nuevos === 1 ? "" : "s"} nuevo${s.nuevos === 1 ? "" : "s"}`);
            await cargar();
            break;
          }
          if (s.estado === "error") {
            $("status").textContent = "La última búsqueda falló";
            toast("La búsqueda falló: " + (s.error || "error desconocido"));
            break;
          }
        }
      } catch (e) {
        toast("No se pudo lanzar la búsqueda.");
      } finally {
        btn.disabled = false; btn.classList.remove("loading");
        $("btnBuscarText").textContent = "Actualizar ahora";
      }
    }

    // primera carga al abrir la página
    cargar();
  </script>
</body>
</html>
